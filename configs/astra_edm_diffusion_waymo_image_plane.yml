feature_extractor:
  dataset_type: waymo_image_plane
  waymo_root: /work/cs-503/santanto/waymo
  history_steps: 10
  future_steps: 80
  validation_fraction: 0.1
  split_seed: 503
  min_future_valid: 5
  max_segments: 20
  max_samples: 2000
  window_stride: 10
  max_windows_per_track: 4
  camera_name: 1
  image_height: 256
  image_width: 384
  cache_segments: 1
  use_sample_cache: true
  sample_cache_dir: cache/waymo_image_plane
  use_image_cache: true
  image_cache_dir: cache/waymo_image_plane

training:
  batch_size: 16
  num_epochs: 100
  learning_rate: 1.0e-4
  weight_decay: 1.0e-4
  optimizer: adamw
  gradient_clip_norm: 1.0
  mixed_precision: true
  num_workers: 8
  persistent_workers: false
  prefetch_factor: 2
  pin_memory: true
  from_checkpoint: false
  save_to: checkpoints/astra_edm_diffusion_waymo_image_plane_prior_correction_knots_regularized_latest.pth
  early_stopping_monitor: val/loss
  early_stopping_patience: 20
  early_stopping_min_delta: 1.0e-4
  wandb_project: astra-edm-waymo-image-plane
  wandb_mode: online
  diagnostics_enabled: true
  diagnostics_interval: 1
  diagnostics_batches: 1
  monotonicity_eval_steps: [1, 2, 4, 8, 16]
  monotonicity_repeats: 1
  monotonicity_seed: null
  mode_diagnostics_sampling_steps: 8
  mode_collapse_prob_threshold: 0.90
  mode_collapse_diversity_threshold: 0.05
  visualization_enabled: true
  visualization_interval: 1
  visualization_num_samples: 2
  visualization_indices: null
  visualization_random: true
  visualization_random_scene: true
  visualization_moving_only: true
  visualization_min_motion_px: 12.0
  visualization_seed: null
  visualization_num_steps: 8
  visualization_frame_ms: 450
  visualization_gt_only_frames: 2
  visualization_mode_selection: best
  visualization_gmm_heatmap: all
  visualization_heatmap_alpha: 105
  visualization_save_gmm_png: true
  visualization_output_dir: visualizations/image_plane_training

model:
  type: astra_edm_diffusion
  use_rgb_context: true
  rgb_backbone: unet_resnet18
  rgb_backbone_stage: -2
  rgb_backbone_weights: astra/pretrained_weights/unet/pie_unet_model_best.pt
  freeze_rgb_backbone: true
  input_dim: 4
  max_agents: 1
  num_modes_K: 6
  trajectory_dim_dy: 2
  d_model: 256
  context_layers: 2
  num_layers: 4
  num_heads: 8
  dropout: 0.1
  roi_feature_size: 3
  sigma_data: 1.0
  sigma_min: 0.01
  sigma_max: 1.0
  rho: 7.0
  num_sampling_steps: 12
  P_mean: -1.0
  P_std: 0.8
  sigma_min_train: 0.01
  sigma_max_train: 1.0
  use_edm_loss_weighting: false
  log_std_min: -5.0
  log_std_max: 2.0
  offdiag_clip: 2.0
  lambda_diff: 0.25
  lambda_wta_diff: 0.0
  lambda_nll: 0.05
  lambda_ade: 1.0
  lambda_fde: 1.0
  lambda_mode: 0.5
  lambda_mode_margin: 0.0
  mode_margin: 0.5
  lambda_cov: 0.00
  lambda_bounds: 0.0
  lambda_smooth: 0.0
  lambda_accel: 0.0
  lambda_jerk: 0.0
  lambda_prior_residual: 0.01
  lambda_speed: 0.0
  lambda_entropy: 0.0
  lambda_diversity: 0.0
  diversity_margin: 0.24
  diversity_reference_box_size: 0.08
  diversity_min_scale: 0.35
  diversity_max_scale: 2.50
  diversity_y_top_scale: 0.75
  diversity_y_bottom_scale: 1.25
  diversity_size_exponent: 1.0
  diversity_y_exponent: 1.0
  speed_cap: 0.35
  use_self_conditioning: true
  self_condition_prob: 0.5
  sampler_type: heun
  rollout_loss_prob: 0.10
  rollout_min_steps: 1
  rollout_max_steps: 2
  lambda_rollout_diff: 0.5
  use_prior_initialization: true
  use_prior_correction: true
  prior_noise_prob: 0.5
  prior_fan_magnitude: 0.15
  prior_residual_scale: 0.02
  initial_noise_type: radial_control_points
  radial_mode_radius: 0.20
  radial_jitter_scale: 0.02
  radial_gaussian_scale: 0.5
  radial_train_noise_prob: 0.25
  radial_include_center_mode: true
  radial_radius_growth: linear
  monotonicity_eval_steps: [1, 2, 4, 8, 16]
  monotonicity_tolerance: 1.0e-4
  use_control_points: true
  num_knots: 6
  knot_placement: uniform
  interpolation: catmull_rom
